name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build Tokify.app (macOS universal)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cmd/tock-desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Stamp version from tag into wails.json
        # The tag is like "v0.1.0"; Wails wants a bare version string in the
        # productVersion field, which gets baked into Info.plist.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building Tokify ${VERSION}"
          # macOS sed needs an empty backup arg; -i '' is portable on darwin.
          sed -i '' -E "s/\"productVersion\": *\"[^\"]*\"/\"productVersion\": \"${VERSION}\"/" cmd/tock-desktop/wails.json
          grep productVersion cmd/tock-desktop/wails.json

      - name: Build universal .app
        working-directory: cmd/tock-desktop
        env:
          NEON_AUTH_URL: ${{ secrets.NEON_AUTH_URL }}
          NEON_DATA_URL: ${{ secrets.NEON_DATA_URL }}
        # Bake the Neon endpoints into the binary the same way
        # `make desktop-build-universal` does via -ldflags. CI builds wails
        # directly (not through the Makefile), so inject them here or the
        # released .app ships with empty DefaultAuthURL/DefaultDataURL and
        # Neon auth + sync are dead.
        run: |
          wails build -clean -platform darwin/universal \
            -ldflags "-X github.com/kriuchkov/tock/internal/integrations/neonauth.DefaultAuthURL=${NEON_AUTH_URL} -X github.com/kriuchkov/tock/internal/integrations/neonsync.DefaultDataURL=${NEON_DATA_URL}"

      - name: Rename bundle to Tokify.app
        run: |
          cd cmd/tock-desktop/build/bin
          if [ -d tock-desktop.app ]; then
            rm -rf Tokify.app
            mv tock-desktop.app Tokify.app
          fi
          ls -la

      - name: Build Teams auth helper (universal) and embed in Tokify.app
        # The desktop app shells out to this helper to drive Microsoft
        # sign-in in its own WKWebView window. Without it the Teams
        # integration's Connect button fails with "helper not found".
        run: |
          make teams-auth-build-universal
          cp bin/tock-teams-auth \
            cmd/tock-desktop/build/bin/Tokify.app/Contents/MacOS/tock-teams-auth
          ls -la cmd/tock-desktop/build/bin/Tokify.app/Contents/MacOS/

      - name: Install license-gathering tools
        run: |
          go install github.com/google/go-licenses@latest
          npm install -g license-checker-rseidelsohn
          # jq is preinstalled on macos-latest runners.

      - name: Generate THIRD_PARTY_NOTICES.txt
        run: ./scripts/gen-notices.sh "$PWD/THIRD_PARTY_NOTICES.txt"

      - name: Bundle license texts into Tokify.app
        run: |
          RES="cmd/tock-desktop/build/bin/Tokify.app/Contents/Resources"
          mkdir -p "$RES"
          cp LICENSE "$RES/LICENSE"
          cp THIRD_PARTY_NOTICES.txt "$RES/THIRD_PARTY_NOTICES.txt"
          # Geist is the only bundled font; ship its OFL alongside.
          GEIST_LICENSE="cmd/tock-desktop/frontend/node_modules/@fontsource-variable/geist/LICENSE"
          if [ -f "$GEIST_LICENSE" ]; then
            cp "$GEIST_LICENSE" "$RES/Geist-OFL.txt"
          else
            echo "Geist license not found at $GEIST_LICENSE" >&2
            exit 1
          fi

      - name: Zip Tokify.app
        run: |
          cd cmd/tock-desktop/build/bin
          ASSET="Tokify-${GITHUB_REF_NAME}-macos-universal.zip"
          # `ditto` preserves macOS bundle attributes (resource forks,
          # extended attrs) better than plain `zip`.
          ditto -c -k --sequesterRsrc --keepParent Tokify.app "$ASSET"
          shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: Tokify ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            cmd/tock-desktop/build/bin/Tokify-${{ github.ref_name }}-macos-universal.zip
            cmd/tock-desktop/build/bin/Tokify-${{ github.ref_name }}-macos-universal.zip.sha256
            THIRD_PARTY_NOTICES.txt
          body: |
            ## Install

            ### One-liner

            ```sh
            curl -fsSL https://raw.githubusercontent.com/finchett/tokify/main/install.sh | sh
            ```

            ### Manual

            1. Download `Tokify-${{ github.ref_name }}-macos-universal.zip` below.
            2. Unzip and drag `Tokify.app` into `/Applications`.
            3. First launch: right-click → **Open** → **Open**, or
               `xattr -dr com.apple.quarantine /Applications/Tokify.app`.

            Tokify releases are not yet signed with an Apple Developer ID;
            see the [README](https://github.com/finchett/tokify#install) for
            details.
