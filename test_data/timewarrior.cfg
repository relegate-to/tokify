# TimeWarrior test config — used by tagcolors integration tests and manual
# testing with: tock --config test_data/test_config.yaml --backend timewarrior calendar
#
# tags.<name>.color = <spec>  — assigns a foreground color to a tag in the TUI.
# These values take precedence over theme.tag_colors in tock.yaml.
#
# Spec format: colorN | rgbRGB (e.g. rgb135) | grayN | black|red|green|yellow|blue|magenta|cyan|white
# Modifiers (bold, underline, on_colorN) are parsed but only the foreground is used.

tags.Work.color = color3
tags.Coding.color = black on yellow
tags.Development.color = black on magenta
tags.Meetings.color = color196
tags.Lunch.color = gray8
