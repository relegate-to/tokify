<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    .tt-mono3 { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-variant-numeric: tabular-nums; }
    .tt-copy-btn3:hover { background: #e8e2d4 !important; }
    .tt-create-btn3:hover { filter: brightness(0.95); }
    .tt-remove-btn3:hover { text-decoration: underline; }
  </style>
</helmet>

<div style="position: absolute; width: 270px; background: #fff; border-radius: 14px; box-shadow: 0 16px 40px -12px rgba(20,20,25,0.3); border: 1px solid #eee; padding: 15px; z-index: 30; text-align: left; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;">
  <sc-if value="{{ isShared }}" hint-placeholder-val="{{ false }}">
    <div>
      <div style="font-size: 13.5px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px;">Shared entry</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="tt-mono3" style="flex: 1; font-size: 12px; color: #6b6b70; background: #f7f7f8; border: 1px solid #ececec; border-radius: 8px; padding: 7px 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ item.shareLink }}</div>
        <button class="tt-copy-btn3" onClick="{{ item.copyShareLink }}" style="background: #efe6cf; color: #7a5f16; border: none; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;">{{ item.shareCopyLabel }}</button>
      </div>
      <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
        <div style="font-size: 11.5px; color: #b3b3b8;">Anyone with the link can view this entry.</div>
        <button class="tt-remove-btn3" onClick="{{ item.removeShareLink }}" style="background: none; border: none; color: #b3782e; font-size: 11.5px; font-weight: 500; cursor: pointer; padding: 0; white-space: nowrap; margin-left: 8px;">Remove</button>
      </div>
    </div>
  </sc-if>
  <sc-if value="{{ isNotShared }}" hint-placeholder-val="{{ true }}">
    <div>
      <div style="font-size: 13.5px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px;">Share this entry</div>
      <div style="font-size: 12px; color: #8a8a90; margin-bottom: 12px;">Creates a view-only link for just this activity — separate from your project or team.</div>
      <button class="tt-create-btn3" onClick="{{ item.createShareLink }}" style="width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 8px 0; font-size: 13px; font-weight: 500; cursor: pointer;">Create link</button>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;item&quot;: {&quot;editor&quot;: null, &quot;tsType&quot;: &quot;object&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const isShared = !!this.props.item?.isShared;
    return {
      item: this.props.item,
      isShared,
      isNotShared: !isShared,
    };
  }
}

</script>
</body>
</html>
